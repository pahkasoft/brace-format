<!doctype html>
<html>

<head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Test</title>
</head>

<body>
    <h1>Browser Test</h1>

    <div id="success">
        <h2>Success</h2>
    </div>
    <div id="error">
        <h2>Error</h2>
    </div>

    <script src="../../node_modules/@tspro/format-test-script/index.js"></script>

    <script>
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = src;
                script.async = true;
                script.onload = () => resolve(script);
                script.onerror = () => reject(src);
                document.head.appendChild(script);
            });
        }

        function addInnerHtml(tag, str) {
            document.getElementById(tag).innerHTML += str;
        }

        function addError(src) {
            addInnerHtml("error", "<h3>Failed To Load</h3>");
            addInnerHtml("error", "<b>SRC:</b> " + src + "<br />");
        }

        function runTest(src, LibName) {
            addInnerHtml("success", "<h3>Test Success</h3>");
            addInnerHtml("success", "<b>SRC:</b> " + src + "<br />");
            formatTest(LibName, str => addInnerHtml("success", str + "<br />"));
        }
    </script>

    <script>
        var VERSION = "4.1.0";

        [
            // StdFormat unpkg
            "https://unpkg.com/@sbrockma/std-format@" + VERSION + "/dist/index.global.js",
            "https://unpkg.com/@sbrockma/std-format@" + VERSION + "/dist/index.iife.min.js",
            "https://unpkg.com/@sbrockma/std-format@" + VERSION + "/dist/index.polyfilled.iife.min.js",
            // SrtdFormat jsdelivr
            "https://cdn.jsdelivr.net/npm/@sbrockma/std-format@" + VERSION + "/dist/index.global.js",
            "https://cdn.jsdelivr.net/npm/@sbrockma/std-format@" + VERSION + "/dist/index.iife.min.js",
            "https://cdn.jsdelivr.net/npm/@sbrockma/std-format@" + VERSION + "/dist/index.polyfilled.iife.min.js",
            // StdFormat local
            "../../dist/sbrockma-std-format/dist/index.global.js",
            "../../dist/sbrockma-std-format/dist/index.iife.min.js",
            "../../dist/sbrockma-std-format/dist/index.polyfilled.iife.min.js",
            // BraceFormat unpkg
            "https://unpkg.com/@tspro/brace-format@" + VERSION + "/dist/index.global.js",
            "https://unpkg.com/@tspro/brace-format@" + VERSION + "/dist/index.iife.min.js",
            "https://unpkg.com/@tspro/brace-format@" + VERSION + "/dist/index.polyfilled.iife.min.js",
            // BraceFormat jsdelivr
            "https://cdn.jsdelivr.net/npm/@tspro/brace-format@" + VERSION + "/dist/index.global.js",
            "https://cdn.jsdelivr.net/npm/@tspro/brace-format@" + VERSION + "/dist/index.iife.min.js",
            "https://cdn.jsdelivr.net/npm/@tspro/brace-format@" + VERSION + "/dist/index.polyfilled.iife.min.js",
            // BraceFormat local
            "../../dist/tspro-brace-format/dist/index.global.js",
            "../../dist/tspro-brace-format/dist/index.iife.min.js",
            "../../dist/tspro-brace-format/dist/index.polyfilled.iife.min.js"
        ].forEach(src => loadScript(src)
            .then(script => {
                runTest(script.src, window.BraceFormat ?? window.StdFormat);
                window.BraceFormat = window.StdFormat = undefined;
            })
            .catch(src => {
                addError(src);
                window.BraceFormat = window.StdFormat = undefined;
            })
        );
    </script>
</body>

</html>
