<!doctype html>
<html>

<head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Test</title>
</head>

<body>
    <h1>Browser Test</h1>

    <div id="error">
        <h2>Errors</h2>
    </div>
    <div id="test">
        <h2>Tests</h2>
    </div>

    <script>
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = src;
                script.async = true;
                script.onload = () => resolve(script);
                script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
                document.head.appendChild(script);
            });
        }
        function addError(err) {
            document.getElementById("error").innerHTML = document.getElementById("error").innerHTML + "<p>" + err.toString() + "</p>";
        }

        function runTest(src, LibName) {
            var format = LibName.format;
            var int = LibName.int;
            var str = "<h3>Test</h3>" + src + "<br />";
            str += format("<p>{__LIB_INFO__}</p>");
            str += format("<p>Test: {}, {}</p>", "Hello World", int(99));
            str += format("<p>Test 'n': {:n}</p>", 9999999999);
            document.getElementById("test").innerHTML = document.getElementById("test").innerHTML + "<p>" + str + "</p>";
        }
    </script>

    <script>
        var VERSION = "4.1.0";

        var StdFormatSrcs = [
            "https://unpkg.com/@sbrockma/std-format@" + VERSION + "/dist/index.global.js",
            "https://unpkg.com/@sbrockma/std-format@" + VERSION + "/dist/index.iife.min.js",
            "https://unpkg.com/@sbrockma/std-format@" + VERSION + "/dist/index.polyfilled.iife.min.js",
            "../../../dist/sbrockma-std-format/dist/index.global.js",
            "../../../dist/sbrockma-std-format/dist/index.iife.min.js",
            "../../../dist/sbrockma-std-format/dist/index.polyfilled.iife.min.js"
        ].forEach(src => {
            loadScript(src)
                .then(script => runTest(script.src, window.StdFormat))
                .catch(err => addError(err));
        });

        var BraceFormatSrcs = [
            "https://unpkg.com/@tspro/brace-format@" + VERSION + "/dist/index.global.js",
            "https://unpkg.com/@tspro/brace-format@" + VERSION + "/dist/index.iife.min.js",
            "https://unpkg.com/@tspro/brace-format@" + VERSION + "/dist/index.polyfilled.iife.min.js",
            "../../../dist/tspro-brace-format/dist/index.global.js",
            "../../../dist/tspro-brace-format/dist/index.iife.min.js",
            "../../../dist/tspro-brace-format/dist/index.polyfilled.iife.min.js"
        ].forEach(src => {
            loadScript(src)
                .then(script => runTest(script.src, window.BraceFormat))
                .catch(err => addError(err));
        });
    </script>
</body>

</html>
